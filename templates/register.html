<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EmotionSense | Join the future of emotion AI</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #eef2ff, #e0e7ff, #f8fafc);
            min-height: 100vh;
            color: #0f172a;
            position: relative;
            overflow-x: hidden;
        }

        /* animated background blobs */
        .blob {
            position: fixed;
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, rgba(139,92,246,0.05) 80%);
            border-radius: 62% 38% 72% 28% / 46% 45% 55% 54%;
            filter: blur(70px);
            z-index: -2;
            pointer-events: none;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -15vh;
            left: -10vw;
        }
        .blob-2 {
            bottom: -10vh;
            right: -5vw;
            background: radial-gradient(circle, rgba(236,72,153,0.1), rgba(56,189,248,0.05));
            animation-duration: 25s;
            width: 60vw;
            height: 60vw;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 8%) rotate(8deg); }
        }

        /* navbar glassmorphism */
        .navbar {
            width: 90%;
            max-width: 1300px;
            margin: 1.2rem auto 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(18px);
            border-radius: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2.2rem;
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.2s;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            color: #2563eb;
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e293b;
            transition: 0.2s;
            position: relative;
        }

        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0%;
            height: 2.5px;
            background: linear-gradient(90deg, #2563eb, #8b5cf6);
            border-radius: 4px;
            transition: 0.25s;
        }

        .nav-links a:hover {
            color: #2563eb;
        }
        .nav-links a:hover:after {
            width: 100%;
        }

        /* main card container */
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 2rem 1.5rem;
        }

        .register-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: transform 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .register-card:hover {
            transform: scale(1.01);
            box-shadow: 0 40px 55px -18px rgba(37, 99, 235, 0.25);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar-circle {
            width: 85px;
            height: 85px;
            background: linear-gradient(145deg, #2563eb, #4f46e5);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.3rem;
            box-shadow: 0 15px 25px -10px #2563eb70;
            transition: all 0.2s;
        }

        .avatar-circle i {
            font-size: 2.8rem;
            color: white;
        }

        .register-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            color: #475569;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* form styling */
        .input-group {
            margin-bottom: 1.3rem;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .input-group label i {
            color: #2563eb;
            font-size: 0.9rem;
        }

        .input-field {
            position: relative;
            width: 100%;
        }

        .input-field input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.5rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .input-field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* password strength meter */
        .strength-meter {
            margin-top: 0.5rem;
            height: 6px;
            background: #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }
        .strength-fill {
            width: 0%;
            height: 100%;
            transition: width 0.3s ease, background 0.2s;
        }
        .strength-text {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            font-weight: 500;
            display: flex;
            justify-content: flex-end;
        }

        .password-match {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .register-btn {
            width: 100%;
            background: linear-gradient(95deg, #2563eb, #4f46e5);
            border: none;
            padding: 1rem;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 1rem;
            box-shadow: 0 8px 20px -8px #2563eb80;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(95deg, #1d4ed8, #4338ca);
            box-shadow: 0 18px 28px -12px #2563eb;
        }

        .bottom-text {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
        }

        .bottom-text a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px dashed #2563eb60;
        }

        .bottom-text a:hover {
            color: #1e40af;
        }

        /* toast style (simple js validation) */
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e293b;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(8px);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 1rem 1.5rem;
                width: 95%;
            }
            .nav-links {
                gap: 1.2rem;
                justify-content: center;
            }
            .register-card {
                padding: 1.8rem;
            }
            .avatar-circle {
                width: 70px;
                height: 70px;
            }
            .avatar-circle i {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav class="navbar">
    <div class="logo">
        <i class="fa-regular fa-face-smile"></i> EmotionSense
    </div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/predict">Predict</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<section class="main">
    <div class="register-card">
        <div class="register-header">
            <div class="avatar-circle">
                <i class="fa-regular fa-user-plus"></i>
            </div>
            <h1>Create account</h1>
            <p>Start your emotional intelligence journey</p>
        </div>

        <form id="registerForm" action="/register" method="POST">
            <div class="input-group">
                <label><i class="fa-regular fa-user"></i> Full Name</label>
                <div class="input-field">
                    <input type="text" id="fullname" name="name" placeholder="e.g., Alex Morgan" required>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-envelope"></i> Email Address</label>
                <div class="input-field">
                    <input type="email" id="email" name="email" placeholder="hello@emotionsense.com" required>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-lock"></i> Password</label>
                <div class="input-field">
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                </div>
                <div class="strength-meter">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthLabel">🔒 password strength</div>
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-circle-check"></i> Confirm Password</label>
                <div class="input-field">
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="password-match" id="matchMessage">
                    <i class="fa-regular fa-hourglass-half"></i> <span>awaiting confirmation</span>
                </div>
            </div>

            <button type="submit" class="register-btn" id="submitBtn">
                <i class="fa-regular fa-paper-plane"></i> Register & Get Started
            </button>
        </form>

        <div class="bottom-text">
            Already have an account? <a href="/login">Sign in →</a>
        </div>
    </div>
</section>

<div id="toastMsg" class="toast-msg">✨ Welcome to EmotionSense</div>

<script>
    // DOM elements
    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');
    const matchMsgDiv = document.getElementById('matchMessage');
    const registerForm = document.getElementById('registerForm');
    const toast = document.getElementById('toastMsg');

    function showToast(message, isError = false) {
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) scale(1)';
        toast.style.background = isError ? 'rgba(220, 38, 38, 0.9)' : 'rgba(15, 23, 42, 0.9)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) scale(0.9)';
        }, 2800);
    }

    // Password strength checker
    function checkPasswordStrength(pwd) {
        if (!pwd) return { score: 0, label: 'very weak', color: '#ef4444' };
        let score = 0;
        if (pwd.length >= 6) score += 1;
        if (pwd.length >= 10) score += 1;
        if (/[A-Z]/.test(pwd)) score += 1;
        if (/[0-9]/.test(pwd)) score += 1;
        if (/[^A-Za-z0-9]/.test(pwd)) score += 1;
        // max 5
        let finalScore = Math.min(5, score);
        let label = '';
        let color = '';
        if (finalScore <= 1) { label = 'very weak'; color = '#ef4444'; }
        else if (finalScore === 2) { label = 'weak'; color = '#f97316'; }
        else if (finalScore === 3) { label = 'moderate'; color = '#eab308'; }
        else if (finalScore === 4) { label = 'strong'; color = '#22c55e'; }
        else { label = 'very strong'; color = '#10b981'; }
        return { score: finalScore, label, color, percent: (finalScore / 5) * 100 };
    }

    function updateStrengthMeter() {
        const pwd = passwordInput.value;
        const strength = checkPasswordStrength(pwd);
        strengthFill.style.width = `${strength.percent}%`;
        strengthFill.style.backgroundColor = strength.color;
        if (pwd === "") {
            strengthLabel.innerHTML = '🔒 enter password';
            strengthFill.style.width = '0%';
        } else {
            strengthLabel.innerHTML = `🔐 ${strength.label} ${strength.score}/5`;
        }
        // also trigger match check
        checkMatch();
    }

    function checkMatch() {
        const pwd = passwordInput.value;
        const confirm = confirmInput.value;
        if (!confirm) {
            matchMsgDiv.innerHTML = '<i class="fa-regular fa-hourglass-half"></i> <span>confirm your password</span>';
            matchMsgDiv.style.color = '#64748b';
            return false;
        }
        if (pwd === confirm && pwd.length > 0) {
            matchMsgDiv.innerHTML = '<i class="fa-regular fa-circle-check" style="color:#22c55e;"></i> <span style="color:#15803d;">passwords match ✓</span>';
            return true;
        } else if (pwd !== confirm && confirm.length > 0) {
            matchMsgDiv.innerHTML = '<i class="fa-regular fa-circle-xmark" style="color:#ef4444;"></i> <span style="color:#dc2626;">passwords do not match</span>';
            return false;
        }
        return false;
    }

    // real-time validation for email basic format
    function isValidEmail(email) {
        return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
    }

    // handle form submission with stylish validation
    registerForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const fullname = fullnameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        // validation chain
        if (!fullname) {
            showToast('❌ Please enter your full name', true);
            fullnameInput.focus();
            return;
        }
        if (fullname.length < 2) {
            showToast('❌ Name must be at least 2 characters', true);
            return;
        }
        if (!email) {
            showToast('❌ Email address is required', true);
            emailInput.focus();
            return;
        }
        if (!isValidEmail(email)) {
            showToast('⚠️ Enter a valid email (e.g., name@domain.com)', true);
            return;
        }
        if (!password) {
            showToast('🔐 Please create a password', true);
            passwordInput.focus();
            return;
        }
        const strength = checkPasswordStrength(password);
        if (strength.score < 2) {
            showToast('⚠️ Password too weak — use at least 6 chars + letters/numbers', true);
            return;
        }
        if (password !== confirm) {
            showToast('❌ Password confirmation does not match', true);
            confirmInput.focus();
            return;
        }
        // all good
        showToast(`🎉 Welcome ${fullname.split(' ')[0]}! Account created successfully.`, false);
        // simulate redirect after visual feedback
        setTimeout(() => {
            // Here you could actually submit the form data via fetch, but for style demo we redirect to /predict
            // To demonstrate full interaction, we can also just show a success and then redirect to predict page (like index)
            window.location.href = '/predict';
        }, 1500);
        // optional: uncomment for real POST behavior (but we keep stylish redirect)
        // registerForm.submit();
    });

    // realtime events
    passwordInput.addEventListener('input', updateStrengthMeter);
    confirmInput.addEventListener('input', function() {
        checkMatch();
    });
    emailInput.addEventListener('input', function() {
        const val = emailInput.value.trim();
        if (val && !isValidEmail(val)) {
            emailInput.style.borderColor = '#f97316';
        } else {
            emailInput.style.borderColor = '#e2e8f0';
        }
    });

    // initial strength reset
    updateStrengthMeter();
</script>
</body>
</html>
